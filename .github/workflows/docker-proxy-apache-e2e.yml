name: E2E Docker Proxy Apache Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 6.x
jobs:
  docker:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Start containers
        run: docker compose -f "./docker/apache-verdaccio/docker-compose.yaml" up -d --build

      - name: Install node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
      - name: verdaccio cli
        run: npm install -g verdaccio --registry http://localhost
      - name: gastby cli
        run: npm install -g gatsby-cli --registry http://localhost
      - name: netlify cli
        run: npm install -g netlify-cli --registry http://localhost
      - name: angular cli
        run: npm install -g @angular/cli --registry http://localhost

      - name: Stop containers
        if: always()
        run: docker compose -f "./docker/apache-verdaccio/docker-compose.yaml" down

name: E2E UI Cypress

concurrency:
  group: e2e-ui-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  e2e-ui:
    if: github.head_ref != 'changeset-release/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: docker
            verdaccio: '6'
          - source: npm
            verdaccio: '6'
    name: UI / ${{ matrix.source }} verdaccio@${{ matrix.verdaccio }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
      - name: corepack
        run: corepack enable
      - name: pnpm enable
        run: corepack prepare pnpm@latest-8 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Start Verdaccio (docker)
        if: matrix.source == 'docker'
        run: |
          docker compose -f ./docker/docker-e2e-ui/docker-compose.yaml build \
            --build-arg VERDACCIO_VERSION=${{ matrix.verdaccio }}
          docker compose -f ./docker/docker-e2e-ui/docker-compose.yaml up -d
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done
      - name: Start Verdaccio (npm)
        if: matrix.source == 'npm'
        run: |
          npm install -g verdaccio@${{ matrix.verdaccio }}
          mkdir -p "$RUNNER_TEMP/verdaccio"
          cp ./docker/docker-e2e-ui/docker.yaml "$RUNNER_TEMP/verdaccio/config.yaml"
          sed -i "s|/verdaccio|$RUNNER_TEMP/verdaccio|g" "$RUNNER_TEMP/verdaccio/config.yaml"
          nohup verdaccio --config "$RUNNER_TEMP/verdaccio/config.yaml" \
            > "$RUNNER_TEMP/verdaccio/verdaccio.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/verdaccio/verdaccio.pid"
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done
      - name: Create test user
        run: |
          curl -s -X PUT \
            -H "Content-Type: application/json" \
            -d '{"name":"test","password":"test","_id":"org.couchdb.user:test","type":"user","roles":[]}' \
            http://localhost:4873/-/user/org.couchdb.user:test
      - name: Run Cypress tests
        run: pnpm test:ui
        env:
          VERDACCIO_URL: http://localhost:4873
      - name: Stop containers
        if: always() && matrix.source == 'docker'
        run: docker compose -f ./docker/docker-e2e-ui/docker-compose.yaml down
      - name: Stop Verdaccio (npm)
        if: always() && matrix.source == 'npm'
        run: |
          if [ -f "$RUNNER_TEMP/verdaccio/verdaccio.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/verdaccio/verdaccio.pid")" || true
          fi
          cat "$RUNNER_TEMP/verdaccio/verdaccio.log" || true

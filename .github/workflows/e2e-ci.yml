name: E2E CLI

concurrency:
  group: e2e-cli-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - name: Use Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version-file: '.nvmrc'
      - name: corepack
        run: corepack enable
      - name: pnpm enable
        run: corepack prepare pnpm@latest-8 --activate
      - name: set store
        run: |
          mkdir ~/.pnpm-store
          pnpm config set store-dir ~/.pnpm-store
      - name: Install
        run: pnpm install
      - name: Cache .pnpm-store
        uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.run_id }}-${{ github.sha }}
          restore-keys: |
            pnpm-
      - name: build
        run: pnpm build
      - name: Cache tools
        uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3
        id: cache-tools
        with:
          path: ./tools/
          key: tools-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.run_id }}-${{ github.sha }}
          restore-keys: |
            tools-

  e2e-cli:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        verdaccio: ['5', '6']
        pm: [npm, pnpm, yarn-classic, yarn-2, yarn-3, yarn-4]
        node: [20, 22]
    name: verdaccio@${{ matrix.verdaccio }} / ${{ matrix.pm }} / node-${{ matrix.node }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: ${{ matrix.node }}
      - name: corepack
        run: corepack enable
      - name: pnpm enable
        run: corepack prepare pnpm@latest-8 --activate
      - uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.run_id }}-${{ github.sha }}
      - uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3
        with:
          path: ./tools/
          key: tools-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.run_id }}-${{ github.sha }}
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Verdaccio
        run: npm install -g verdaccio@${{ matrix.verdaccio }}
      - name: Setup package manager
        run: |
          PM="${{ matrix.pm }}"
          case "$PM" in
            yarn-classic)
              npm install -g yarn@1
              ;;
            yarn-2)
              YARN_DIR=$(mktemp -d)
              npm install --prefix "$YARN_DIR" @yarnpkg/cli-dist@2 --loglevel=error
              echo "YARN_MODERN_BIN=$YARN_DIR/node_modules/@yarnpkg/cli-dist/bin/yarn.js" >> $GITHUB_ENV
              ;;
            yarn-3)
              YARN_DIR=$(mktemp -d)
              npm install --prefix "$YARN_DIR" @yarnpkg/cli-dist@3 --loglevel=error
              echo "YARN_MODERN_BIN=$YARN_DIR/node_modules/@yarnpkg/cli-dist/bin/yarn.js" >> $GITHUB_ENV
              ;;
            yarn-4)
              YARN_DIR=$(mktemp -d)
              npm install --prefix "$YARN_DIR" @yarnpkg/cli-dist@4 --loglevel=error
              echo "YARN_MODERN_BIN=$YARN_DIR/node_modules/@yarnpkg/cli-dist/bin/yarn.js" >> $GITHUB_ENV
              ;;
          esac
      - name: Start Verdaccio
        run: |
          verdaccio &
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done
      - name: Run E2E tests
        run: |
          PM="${{ matrix.pm }}"
          case "$PM" in
            npm|pnpm|yarn-classic)
              PM_ARG="$PM"
              ;;
            yarn-2|yarn-3|yarn-4)
              PM_ARG="yarn-modern=${YARN_MODERN_BIN}"
              ;;
          esac
          node tools/e2e-cli/bin/e2e-cli.js --registry http://localhost:4873 --pm "$PM_ARG"

name: E2E CLI

concurrency:
  group: e2e-cli-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  e2e-cli:
    strategy:
      fail-fast: false
      matrix:
        verdaccio: ['5', '6']
        pm: [npm, pnpm, yarn-classic, yarn-2, yarn-3, yarn-4]
        node: [20, 22]
    name: verdaccio@${{ matrix.verdaccio }} / ${{ matrix.pm }} / node-${{ matrix.node }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: ${{ matrix.node }}
      - name: corepack
        run: corepack enable
      - name: pnpm enable
        run: corepack prepare pnpm@latest-8 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Install Verdaccio
        run: npm install -g verdaccio@${{ matrix.verdaccio }}
      - name: Setup package manager
        run: |
          PM="${{ matrix.pm }}"
          case "$PM" in
            yarn-classic)
              # yarn 1.x is pre-installed on GitHub runners
              echo "Using system yarn $(COREPACK_ENABLE_STRICT=0 yarn --version)"
              ;;
            yarn-2|yarn-3|yarn-4)
              YARN_VERSION="${PM#yarn-}"
              YARN_DIR=$(mktemp -d)
              npm install --prefix "$YARN_DIR" "@yarnpkg/cli-dist@${YARN_VERSION}" --loglevel=error
              echo "E2E_YARN_BIN=$YARN_DIR/node_modules/@yarnpkg/cli-dist/bin/yarn.js" >> $GITHUB_ENV
              ;;
          esac
      - name: Start Verdaccio
        run: |
          verdaccio &
          for i in $(seq 1 30); do
            curl -s http://localhost:4873/-/ping && break
            sleep 1
          done
      - name: Run E2E tests
        run: |
          PM="${{ matrix.pm }}"
          case "$PM" in
            npm|pnpm|yarn-classic)
              PM_ARG="$PM"
              ;;
            yarn-2|yarn-3|yarn-4)
              PM_ARG="yarn-modern=${E2E_YARN_BIN}"
              ;;
          esac
          node tools/e2e-cli/bin/e2e-cli.js --registry http://localhost:4873 --pm "$PM_ARG" -v

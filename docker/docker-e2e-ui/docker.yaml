storage: /verdaccio/storage/data

plugins: /verdaccio/plugins

web:
  enable: true
  title: Verdaccio
  login: true
  # Surface the settings / translations dialog in the header so the
  # e2e-ui settings suite has something to click on.
  showSettings: true
  showInfo: true

auth:
  htpasswd:
    file: /verdaccio/storage/htpasswd

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  '@verdaccio/*':
    access: $all
    publish: $anonymous $authenticated
    unpublish: $anonymous $authenticated
  '@*/*':
    access: $all
    publish: $anonymous $authenticated
    unpublish: $anonymous $authenticated
    proxy: npmjs
  '**':
    access: $all
    publish: $anonymous $authenticated
    unpublish: $anonymous $authenticated
    proxy: npmjs

middlewares:
  audit:
    enabled: true

# Loosen the default rate limit on /-/verdaccio/sec/* endpoints so
# cypress runs (which log in repeatedly across specs) don't hit 429.
userRateLimit:
  windowMs: 1000
  max: 10000

# Exposes the Change Password page (/-/web/change-password). Without
# this flag the React component redirects to `/` on mount, and the
# 07-change-password cypress spec fails at its navigation check.
#
# Using the legacy `experiments:` key (5.x) instead of the newer `flags:`
# because the `verdaccio:6` docker image's bundled `@verdaccio/middleware`
# only spreads `...config.experiments` into the client-side UI options
# object. The `...config.flags` spread was added later and has not yet
# shipped in a tagged image. Current 6.x treats both keys equivalently,
# so this stays correct once the image catches up.
experiments:
  changePassword: true

log: { type: stdout, format: json, level: info }
